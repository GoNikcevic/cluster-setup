# Kubernetes Cluster Configuration
# This file is consumed by deploy-cluster.sh to orchestrate the cluster deployment.
# It can be generated automatically by create-cluster-config.sh or edited manually.
#
# All IP addresses must be reachable from the control host.
# SSH key-based authentication must be configured before deployment.

# Cluster identification
# The cluster name is used for labeling and identification purposes.
cluster_name: my-cluster

# Kubernetes version
# Specify the minor version (e.g. 1.29). The latest patch version will be installed.
kubernetes_version: "1.29"

# SSH configuration for remote node access
# These credentials are used by deploy-cluster.sh to connect to all nodes.
ssh:
  # The SSH user that has sudo privileges on all nodes
  user: ubuntu
  # Path to the SSH private key (generated by generate-ssh-keys.sh)
  key_path: ~/.ssh/id_rsa_cluster

# Master node configuration
# The master node runs the Kubernetes control plane (API server, scheduler, controller manager, etcd).
master:
  # Hostname to assign to the master node
  hostname: master-01
  # IP address of the master node (must be a static IP)
  ip: 10.0.0.10
  # Roles assigned to this node
  role: controlplane,etcd

# Worker node configuration
# Worker nodes run application workloads. Add as many workers as needed.
workers:
  - hostname: worker-01
    ip: 10.0.0.11
    role: worker
  - hostname: worker-02
    ip: 10.0.0.12
    role: worker
  # Add more workers as needed:
  # - hostname: worker-03
  #   ip: 10.0.0.13
  #   role: worker

# Network settings
# These settings control the cluster networking and CNI plugin configuration.
network:
  # Pod network CIDR - IP range allocated to pods across the cluster.
  # Default 192.168.0.0/16 is used by Calico. Do not overlap with node or service CIDRs.
  pod_cidr: 192.168.0.0/16
  # Service network CIDR - IP range allocated to Kubernetes ClusterIP services.
  # Default 10.96.0.0/12 is the kubeadm default.
  service_cidr: 10.96.0.0/12
  # CNI plugin to install. Currently only Calico is supported.
  cni_plugin: calico
